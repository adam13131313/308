<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e14" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0e14; color: #c5cdd8; font-family: Menlo, "SF Mono", monospace; font-size: 12px; -webkit-font-smoothing: antialiased; padding-bottom: env(safe-area-inset-bottom); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #1e2530; border-radius: 2px; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }
  .header { padding: calc(14px + env(safe-area-inset-top)) 16px 14px; border-bottom: 1px solid #1a1f2b; position: sticky; top: 0; background: #0a0e14; z-index: 10; }
  .title { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .nav { display: flex; gap: 4px; margin-top: 8px; align-items: center; }
  .nav button { padding: 5px 12px; font-size: 10px; background: transparent; color: #3d4556; border: none; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .nav button.active { background: #1a1f2b; color: #fff; }
  .nav .gear { margin-left: auto; font-size: 10px; padding: 5px 12px; color: #3ddc84; background: #142a1f; border-radius: 4px; font-weight: 700; letter-spacing: 1px; }
  .stats { display: flex; gap: 1px; padding: 0 16px; margin: 12px 0; }
  .stat { flex: 1; background: #10141c; padding: 8px 4px; border-radius: 4px; text-align: center; }
  .stat-label { font-size: 7px; color: #3d4556; letter-spacing: 0.3px; }
  .stat-value { font-size: 13px; font-weight: 700; }
  .content { padding: 0 16px 90px; }
  .week-head { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: #0d1118; border: 1px solid #12161f; border-radius: 5px; margin-bottom: 3px; }
  .week-head.open { border-radius: 5px 5px 0 0; background: #0f1420; }
  .week-head.current { background: #111722; }
  .phase-tag { font-size: 8px; padding: 2px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .week-body { background: #0f1420; border-top: none; border-radius: 0 0 5px 5px; padding: 8px; margin-bottom: 3px; }
  .day { display: flex; align-items: flex-start; gap: 6px; padding: 6px 8px; border-radius: 4px; margin-bottom: 2px; border-left: 3px solid #1a1f2b; }
  .day.run { background: #0d1a0d; border-left-color: #3ddc84; }
  .day.fast { border-left-color: #ff9100; }
  .day.rest { opacity: 0.4; }
  .day.loggable { cursor: pointer; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 19; }
  .modal { position: fixed; bottom: 0; left: 0; right: 0; background: #10141c; border-top: 2px solid #3ddc84; padding: 14px 14px calc(14px + env(safe-area-inset-bottom)); z-index: 20; }
  .modal input { width: 100%; padding: 9px; margin-bottom: 6px; background: #0a0e14; border: 1px solid #1a1f2b; border-radius: 4px; color: #fff; font-size: 14px; }
  .modal-row { display: flex; gap: 6px; }
  .btn-save { flex: 1; padding: 10px; background: #3ddc84; color: #0a0e14; border: none; border-radius: 4px; font-weight: 700; font-size: 12px; }
  .btn-cancel { padding: 10px 16px; background: #1a1f2b; color: #3d4556; border: none; border-radius: 4px; font-size: 12px; }
  .btn-del { padding: 10px 14px; background: #2b1a1a; color: #ff6a4a; border: none; border-radius: 4px; font-size: 12px; }
  .card { background: #10141c; border-radius: 6px; padding: 14px; margin-bottom: 10px; }
  .card-title { font-weight: 700; font-size: 12px; margin-bottom: 10px; }
  svg { width: 100%; display: block; }
  textarea.data-box { width: 100%; height: 200px; background: #0a0e14; border: 1px solid #1a1f2b; border-radius: 4px; color: #c5cdd8; font-size: 10px; padding: 8px; resize: none; margin-bottom: 8px; }
  .toast { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: #3ddc84; color: #0a0e14; padding: 10px 18px; border-radius: 20px; font-size: 12px; font-weight: 700; z-index: 30; }
  .empty { text-align: center; padding: 40px 20px; color: #3d4556; }
  .detail-modal { position: fixed; bottom: 0; left: 0; right: 0; background: #10141c; border-top: 2px solid #3ddc84; padding: 18px 18px calc(18px + env(safe-area-inset-bottom)); z-index: 20; }
  .detail-date { font-size: 13px; color: #7d8590; margin-bottom: 2px; }
  .detail-dist { font-size: 38px; font-weight: 700; color: #3ddc84; line-height: 1.1; }
  .detail-grid { display: flex; gap: 20px; margin: 14px 0; }
  .detail-stat-label { font-size: 11px; color: #3d4556; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-stat-val { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .detail-section { font-size: 13px; color: #8b949e; padding: 8px 0; border-top: 1px solid #1a1f2b; line-height: 1.5; }
  .detail-label { font-size: 11px; color: #3d4556; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// TRAINING PLAN (methodology, not personal data)
// ============================================================
var PLAN_DATA = [
  { week:1, phase:"Base", dates:"27 Apr - 03 May", planned:51, sessions:[["Easy 7km","5:15-5:30/km, conversational"],["Easy 10km + strides","5:15-5:30/km + 6x80m strides"],["Rest",""],["Easy 10km","5:15-5:30/km"],["Easy 7km","5:15-5:30/km"],["Rest",""],["Long Run 17km","5:00-5:30/km steady"]] },
  { week:2, phase:"Base", dates:"04 May - 10 May", planned:54, sessions:[["Easy 7km","5:15-5:30/km"],["Easy 10km + strides","5:15-5:30/km + 6x80m strides"],["Rest",""],["Fartlek 10km","6x2min hard / 2min easy float"],["Easy 7km","5:15-5:30/km"],["Rest",""],["Long Run 20km","5:00-5:30/km steady"]] },
  { week:3, phase:"Base", dates:"11 May - 17 May", planned:55, sessions:[["Easy 10km","5:15-5:30/km"],["Tempo 10km","2km w/u, 20min @ 4:18, w/d"],["Long Run 21km","5:00-5:30/km steady"],["Easy 7km","5:15-5:30/km"],["Easy 7km","5:15-5:30/km"],["Rest",""],["Rest",""]] },
  { week:4, phase:"Base", dates:"18 May - 24 May", planned:48, sessions:[["Easy 7km","5:15-5:30/km"],["Easy 10km + strides","5:15-5:30/km + 8x80m strides"],["Rest",""],["Easy 7km","5:15-5:30/km"],["Long Run 17km","5:00-5:30/km steady"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:5, phase:"Build", dates:"25 May - 31 May", planned:55, sessions:[["Easy 7km","5:15-5:30/km"],["Intervals 10km","2km w/u, 5x1km @ 4:00 (90s jog), w/d"],["Rest",""],["Long Run 20km","5:00-5:30/km steady"],["Cruise Intervals 10km","2km w/u, 3x8min @ 4:15 (90s jog), w/d"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:6, phase:"Build", dates:"01 Jun - 07 Jun", planned:59, sessions:[["Easy 7km","5:15-5:30/km"],["Intervals 10km","2km w/u, 6x1km @ 4:00 (90s jog), w/d"],["Rest",""],["Rest",""],["MP Run 14km","2km w/u, 10km @ 4:29, w/d"],["Easy 7km","5:15-5:30/km"],["Long Run 21km","5:00-5:30/km steady"]] },
  { week:7, phase:"Build", dates:"08 Jun - 14 Jun", planned:62, sessions:[["Easy 7km","5:15-5:30/km"],["Cruise Intervals 14km","3km w/u, 4x8min @ 4:12 (90s jog), w/d"],["Rest",""],["Easy 10km + strides","5:15-5:30/km + 8x80m strides"],["Long Run 24km","5:00-5:30/km steady"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:8, phase:"Build", dates:"15 Jun - 21 Jun", planned:48, sessions:[["Easy 7km","5:15-5:30/km"],["Easy 10km","5:15-5:30/km"],["Rest",""],["Easy 7km","5:15-5:30/km"],["Long Run 17km","5:00-5:30/km steady"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:9, phase:"Peak", dates:"22 Jun - 28 Jun", planned:69, sessions:[["Easy 7km","5:15-5:30/km"],["Intervals 14km","3km w/u, 6x1km @ 3:58 (90s jog), w/d"],["Rest",""],["MP Run 14km","2km w/u, 10km @ 4:29, w/d"],["Long Run 27km","5:00-5:30/km steady"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:10, phase:"Peak", dates:"29 Jun - 05 Jul", planned:66, sessions:[["Easy 7km","5:15-5:30/km"],["Cruise Intervals 14km","3km w/u, 4x8min @ 4:10 (90s jog), w/d"],["Rest",""],["Intervals 10km","2km w/u, 8x800m @ 3:50 (90s jog), w/d"],["Long Run 28km (MP)","easy, last 7km @ 4:29 MP"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:11, phase:"Peak", dates:"06 Jul - 12 Jul", planned:71, sessions:[["Easy 7km","5:15-5:30/km"],["MP Run 17km","3km w/u, 14km @ 4:29, w/d"],["Rest",""],["Cruise Intervals 10km","2km w/u, 3x10min @ 4:10 (90s jog), w/d"],["Long Run 30km (MP)","easy, last 10km @ 4:29 MP"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:12, phase:"Peak", dates:"13 Jul - 19 Jul", planned:48, sessions:[["Easy 7km","5:15-5:30/km"],["Easy 10km + strides","5:15-5:30/km + strides"],["Rest",""],["Easy 7km","5:15-5:30/km"],["Long Run 17km","5:00-5:30/km steady"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:13, phase:"Reduced", dates:"20 Jul - 26 Jul", planned:34, sessions:[["Easy 7km","5:15-5:30/km"],["Tempo 10km","2km w/u, 20min @ 4:15, w/d"],["Rest",""],["Rest",""],["Easy 7km","5:15-5:30/km"],["Easy 10km","5:15-5:30/km"],["Rest",""]] },
  { week:14, phase:"Reduced", dates:"27 Jul - 02 Aug", planned:38, sessions:[["Easy 7km","5:15-5:30/km"],["Easy 7km","5:15-5:30/km"],["Rest",""],["Tempo 7km","1km w/u, 15min @ 4:15, w/d"],["Easy 7km","5:15-5:30/km"],["Easy 10km","5:15-5:30/km"],["Rest",""]] },
  { week:15, phase:"Reduced", dates:"03 Aug - 09 Aug", planned:28, sessions:[["Easy 7km","5:15-5:30/km"],["Easy 7km","5:15-5:30/km"],["Rest",""],["Tempo 7km","1km w/u, 15min @ 4:15, w/d"],["Easy 7km","5:15-5:30/km"],["Rest",""],["Rest",""]] },
  { week:16, phase:"Sharpen", dates:"10 Aug - 16 Aug", planned:51, sessions:[["Easy 7km","5:15-5:30/km"],["Cruise Intervals 10km","2km w/u, 3x8min @ 4:08 (90s jog), w/d"],["Rest",""],["MP Run 10km","2km w/u, 6km @ 4:29, w/d"],["Long Run 17km","5:00-5:30/km steady"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:17, phase:"Taper", dates:"17 Aug - 23 Aug", planned:38, sessions:[["Easy 7km","5:15-5:30/km"],["Easy 7km + strides","5:15-5:30/km + 6x80m strides"],["Rest",""],["MP 7km","1km w/u, 4km @ 4:29, w/d"],["Easy 10km","5:15-5:30/km"],["Easy 7km","5:15-5:30/km"],["Rest",""]] },
  { week:18, phase:"Taper", dates:"24 Aug - 30 Aug", planned:21, sessions:[["Easy 7km","5:15-5:30/km relaxed"],["Easy 7km + strides","5:15-5:30/km + 4x80m strides"],["Rest",""],["Shakeout 7km","very easy + 4 strides"],["Rest",""],["Rest",""],["RACE DAY!","Target 3:08:59 @ 4:29/km. Negative split!"]] },
];

var GOAL_PACE_SEC = 269; // 4:29/km marathon goal pace
var DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var RACE_DATE = new Date(2026,7,30);
var PHASE = {
  Base:{c:"#4a9eff",bg:"#142a44"}, Build:{c:"#3ddc84",bg:"#143322"},
  Peak:{c:"#ff9100",bg:"#332211"}, Reduced:{c:"#b388ff",bg:"#261044"},
  Sharpen:{c:"#ffd600",bg:"#33301a"}, Taper:{c:"#ff4081",bg:"#330f22"},
};
var RUNS_KEY = "sydney-marathon-runs";
var METRICS_KEY = "sydney-marathon-metrics";

// ============================================================
// STATE - personal data loaded from localStorage only
// ============================================================
var runs = {};
var metrics = [];
var view = "plan";
var openWeek = null;
var logDate = null;
var detailDate = null;
var dataPanel = false;

function loadAll() {
  runs = {};
  metrics = [];
  try { var r = localStorage.getItem(RUNS_KEY); if (r) runs = JSON.parse(r); } catch(e) {}
  try { var m = localStorage.getItem(METRICS_KEY); if (m) metrics = JSON.parse(m); } catch(e) {}
}
function saveRuns() { try { localStorage.setItem(RUNS_KEY, JSON.stringify(runs)); } catch(e) {} }
function saveMetrics() { try { localStorage.setItem(METRICS_KEY, JSON.stringify(metrics)); } catch(e) {} }

// ============================================================
// HELPERS
// ============================================================
function dateKey(wi, di) {
  var d = new Date(2026, 3, 27 + wi*7 + di);
  return d.getFullYear() + "-" + ("0"+(d.getMonth()+1)).slice(-2) + "-" + ("0"+d.getDate()).slice(-2);
}
function paceToSec(p) {
  if (!p) return null;
  var x = (""+p).split(":");
  if (x.length !== 2) return null;
  return parseInt(x[0])*60 + parseInt(x[1]);
}
function isEasy(s) { return s && (s.indexOf("Easy")===0 || s.indexOf("Long Run")===0 || s.indexOf("Shakeout")===0); }
function weekKm(wi) {
  var t=0,n=0;
  for (var d=0;d<7;d++){ var r=runs[dateKey(wi,d)]; if(r&&r.km){t+=r.km;n++;} }
  return { km: Math.round(t*10)/10, n:n };
}
function currentWeek() { return Math.floor((new Date() - new Date(2026,3,27)) / (7*86400000)); }
function esc(s){ return (""+(s||"")).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function ltPct(ltPace) {
  var ltSec = paceToSec(ltPace);
  if (!ltSec) return null;
  // % of LT speed = (LT pace sec / goal pace sec) since speed is inverse of pace
  return Math.round((ltSec / GOAL_PACE_SEC) * 1000) / 10;
}
function latestMetric() { return metrics.length ? metrics[metrics.length-1] : null; }

// ============================================================
// RENDER
// ============================================================
function render() {
  var totalKm=0, totalRuns=0;
  for (var k in runs){ if(runs[k].km){ totalKm+=runs[k].km; totalRuns++; } }
  totalKm = Math.round(totalKm);
  var days = Math.ceil((RACE_DATE - new Date())/86400000);
  var lm = latestMetric();
  var pct = lm ? ltPct(lm.lt) : null;

  var h = '';
  h += '<div class="header">';
  h += '<div class="title">SYDNEY <span style="color:#ff5c35">3:08:59</span> <span style="font-size:10px;color:#3d4556;font-weight:400">30 AUG 2026</span></div>';
  h += '<div class="nav">';
  ["plan","chart","metrics"].forEach(function(v){
    h += '<button class="'+(view===v?'active':'')+'" onclick="setView(\''+v+'\')">'+v+'</button>';
  });
  h += '<button class="gear" onclick="toggleData()">DATA</button>';
  h += '</div></div>';

  var stats = [
    {l:"Days to go", v:days>0?days:0, c:"#ff5c35"},
    {l:"Total", v:totalKm+"km", c:"#c5cdd8"},
    {l:"Runs", v:totalRuns, c:"#c5cdd8"},
    {l:"VO2", v:lm?lm.vo2:"-", c:"#4a9eff"},
    {l:"MP%", v:pct?pct:"-", c:(pct&&pct<=93)?"#3ddc84":"#ff9100"},
  ];
  h += '<div class="stats">';
  stats.forEach(function(s){ h += '<div class="stat"><div class="stat-label">'+s.l+'</div><div class="stat-value" style="color:'+s.c+'">'+s.v+'</div></div>'; });
  h += '</div>';

  h += '<div class="content">';
  if (view==="plan") h += renderPlan(currentWeek());
  if (view==="chart") h += renderChart();
  if (view==="metrics") h += renderMetrics();
  h += '</div>';

  if (logDate) h += renderLog();
  if (detailDate) h += renderDetail();
  if (dataPanel) h += renderDataPanel();

  document.getElementById("app").innerHTML = h;
}

function renderPlan(cw) {
  var h = '';
  PLAN_DATA.forEach(function(wk, wi){
    var st = weekKm(wi);
    var pct = st.km>0 ? Math.round(st.km/wk.planned*100) : 0;
    var ps = PHASE[wk.phase] || PHASE.Base;
    var pctColor = pct>=95?"#3ddc84":pct>=80?"#ff9100":"#ff5c35";
    var isOpen = openWeek===wi;
    var isCur = wi===cw;
    var cls = "week-head" + (isOpen?" open":"") + (isCur&&!isOpen?" current":"");
    var border = isOpen ? "border-color:"+ps.c+"44;" : "";
    h += '<div class="'+cls+'" style="'+border+'" onclick="toggleWeek('+wi+')">';
    h += '<span style="color:'+(isCur?ps.c:"#3d4556")+';font-size:10px;min-width:24px;font-weight:700">W'+wk.week+'</span>';
    h += '<span class="phase-tag" style="background:'+ps.bg+';color:'+ps.c+'">'+wk.phase+'</span>';
    if (isCur) h += '<span style="font-size:8px;color:'+ps.c+'">NOW</span>';
    h += '<span style="flex:1"></span>';
    if (st.km>0) {
      h += '<span style="font-size:10px;font-weight:700;color:#c5cdd8">'+st.km+'km</span>';
      h += '<span style="font-size:8px;color:#3d4556">of '+wk.planned+'</span>';
      h += '<span style="font-size:9px;font-weight:700;color:'+pctColor+'">'+pct+'%</span>';
    } else {
      h += '<span style="font-size:10px;color:#1e2530">'+wk.planned+'km</span>';
    }
    h += '<span style="font-size:10px;color:#3d4556;margin-left:4px">'+(isOpen?"&minus;":"+")+'</span>';
    h += '</div>';
    if (isOpen) {
      h += '<div class="week-body" style="border:1px solid '+ps.c+'44;border-top:none">';
      h += '<div style="font-size:8px;color:#3d4556;margin-bottom:6px">'+wk.dates+'</div>';
      wk.sessions.forEach(function(sessArr, di){
        var sess = sessArr[0], detail = sessArr[1];
        var dk = dateKey(wi, di);
        var run = runs[dk];
        var isRest = sess==="Rest";
        var tooFast = false;
        if (run && run.pace && isEasy(sess)) { var sec=paceToSec(run.pace); if(sec!==null&&sec<310) tooFast=true; }
        var dcls = "day" + (run?" run":"") + (tooFast?" fast":"") + (isRest&&!run?" rest":"") + (!isRest?" loggable":"");
        var clickAttr = !isRest ? ' onclick="openDetail(event,\''+dk+'\')"' : '';
        h += '<div class="'+dcls+'"'+clickAttr+'>';
        h += '<span style="font-size:9px;color:#3d4556;font-weight:700;min-width:24px;padding-top:1px">'+DAY_NAMES[di]+'</span>';
        h += '<span style="flex:1"><span style="font-size:9px;color:'+(isRest?"#1e2530":"#5a6577")+';display:block">'+esc(sess)+'</span>';
        if (detail) h += '<span style="font-size:8px;color:'+(sess==="RACE DAY!"?"#ff5c35":"#2f3a4a")+';display:block;margin-top:1px">'+esc(detail)+'</span>';
        h += '</span>';
        if (run) {
          h += '<span style="display:flex;align-items:center;gap:5px;padding-top:1px">';
          if (tooFast) h += '<span style="font-size:8px;color:#ff9100">FAST</span>';
          h += '<span style="font-size:12px;font-weight:700;color:'+(tooFast?"#ff9100":"#3ddc84")+'">'+run.km+'</span>';
          if (run.pace) h += '<span style="font-size:8px;color:#3d4556">'+run.pace+'</span>';
          if (run.hr) h += '<span style="font-size:8px;color:#4a9eff">HR'+run.hr+'</span>';
          h += '</span>';
        } else if (!isRest) {
          h += '<span style="font-size:8px;color:#1e2530;padding-top:1px">+ log</span>';
        }
        h += '</div>';
      });
      if (st.km>0) h += '<div style="margin-top:6px;padding:4px 6px;font-size:9px;color:#3d4556;border-top:1px solid '+ps.c+'22">'+st.n+' runs · '+st.km+'km of '+wk.planned+'km · '+pct+'%</div>';
      h += '</div>';
    }
  });
  return h;
}

function renderChart() {
  var hasData = false;
  for (var k in runs){ if(runs[k].km){ hasData=true; break; } }
  if (!hasData) return '<div class="empty">No runs logged yet.<br>Log runs in the Plan tab, or import your data via the gear icon.</div>';

  var cum=[], cp=0, ca=0;
  for (var i=0;i<18;i++){ cp+=PLAN_DATA[i].planned; var s=weekKm(i); if(s.km>0)ca+=s.km; cum.push({w:i+1,p:cp,a:s.km>0?ca:null}); }
  var mx = Math.max.apply(null, cum.map(function(d){return d.p;}));
  var pp = cum.map(function(d,i){return (28+i*(302/17))+","+(155-(d.p/mx)*140);}).join(" ");
  var af = cum.filter(function(d){return d.a!==null;});
  var ap = af.map(function(d,i){return (28+i*(302/17))+","+(155-(d.a/mx)*140);}).join(" ");

  var h = '<div class="card"><div class="card-title">Cumulative KM</div><svg viewBox="0 0 340 170">';
  [0,200,400,600,800].forEach(function(v){ var y=155-(v/mx)*140; h+='<line x1="28" y1="'+y+'" x2="330" y2="'+y+'" stroke="#1a1f2b" stroke-width="0.5"/><text x="25" y="'+(y+3)+'" fill="#3d4556" font-size="6" text-anchor="end">'+v+'</text>'; });
  h += '<polyline fill="none" stroke="#2a3040" stroke-width="1.5" stroke-dasharray="4,3" points="'+pp+'"/>';
  h += '<polyline fill="none" stroke="#3ddc84" stroke-width="2" points="'+ap+'"/>';
  af.forEach(function(d,i){ h+='<circle cx="'+(28+i*(302/17))+'" cy="'+(155-(d.a/mx)*140)+'" r="2.5" fill="#3ddc84"/>'; });
  cum.forEach(function(d,i){ h+='<text x="'+(28+i*(302/17))+'" y="166" fill="#3d4556" font-size="5.5" text-anchor="middle">'+d.w+'</text>'; });
  h += '</svg><div style="display:flex;gap:10px;justify-content:center;margin-top:4px;font-size:8px;color:#3d4556"><span>- - Planned</span><span style="color:#3ddc84">--- Actual</span></div></div>';

  var pts = [];
  Object.keys(runs).sort().forEach(function(k){ var r=runs[k]; if(r.hr&&r.km>=7) pts.push(r.hr); });
  if (pts.length>=2) {
    var minH=120, maxH=165;
    var hp = pts.map(function(v,i){ return (30+i*(300/(pts.length-1)))+","+(110-((v-minH)/(maxH-minH))*95); }).join(" ");
    h += '<div class="card"><div class="card-title">Easy-Run HR Trend</div><div style="font-size:8px;color:#3d4556;margin-bottom:8px">Lower = improving fitness (runs 7km+)</div><svg viewBox="0 0 340 125">';
    [130,145,160].forEach(function(v){ var y=110-((v-minH)/(maxH-minH))*95; h+='<line x1="30" y1="'+y+'" x2="335" y2="'+y+'" stroke="#1a1f2b" stroke-width="0.5"/><text x="27" y="'+(y+3)+'" fill="#3d4556" font-size="6" text-anchor="end">'+v+'</text>'; });
    h += '<polyline fill="none" stroke="#4a9eff" stroke-width="2" points="'+hp+'"/>';
    pts.forEach(function(v,i){ h+='<circle cx="'+(30+i*(300/(pts.length-1)))+'" cy="'+(110-((v-minH)/(maxH-minH))*95)+'" r="2.5" fill="#4a9eff"/>'; });
    h += '</svg></div>';
  }

  h += '<div class="card"><div class="card-title">Weekly Volume</div><svg viewBox="0 0 340 110">';
  PLAN_DATA.forEach(function(wk,i){ var s=weekKm(i); var bw=14; var x=10+i*(326/18); var mw=80; var hpl=(wk.planned/mw)*90; var ha=s.km>0?(s.km/mw)*90:0; var ps=PHASE[wk.phase]||PHASE.Base;
    h+='<rect x="'+x+'" y="'+(98-hpl)+'" width="'+bw+'" height="'+hpl+'" fill="#1a1f2b" rx="2"/>'; if(ha>0) h+='<rect x="'+x+'" y="'+(98-ha)+'" width="'+bw+'" height="'+ha+'" fill="'+ps.c+'" rx="2" opacity="0.6"/>'; h+='<text x="'+(x+bw/2)+'" y="108" fill="#3d4556" font-size="5.5" text-anchor="middle">'+(i+1)+'</text>'; });
  h += '</svg></div>';
  return h;
}

function renderMetrics() {
  var h = '';
  var lm = latestMetric();
  var pct = lm ? ltPct(lm.lt) : null;

  if (lm) {
    var cards = [
      {l:"VO2max",v:lm.vo2,c:"#4a9eff"},
      {l:"LT Pace",v:lm.lt+"/km",c:"#3ddc84"},
      {l:"MP/LT",v:pct+"%",c:(pct<=93)?"#3ddc84":"#ff9100"},
    ];
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">';
    cards.forEach(function(m){ h+='<div class="card" style="margin:0;padding:10px"><div style="font-size:8px;color:#3d4556;text-transform:uppercase;letter-spacing:0.5px">'+m.l+'</div><div style="font-size:16px;font-weight:700;color:'+m.c+';margin:3px 0">'+m.v+'</div></div>'; });
    h += '</div>';

    h += '<div class="card"><div style="font-size:8px;color:#3d4556;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">LT to Marathon Pace Headroom</div>';
    metrics.forEach(function(m){ var p=ltPct(m.lt); var bc=(p<=93)?"#3ddc84":"#ff9100";
      h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="font-size:8px;color:#3d4556;min-width:30px">Wk'+m.week+'</span><div style="flex:1;height:16px;background:#0a0e14;border-radius:3px;position:relative;overflow:hidden"><div style="position:absolute;left:0;top:0;bottom:0;width:'+((100-p)*3)+'%;background:'+bc+'33;border-radius:3px"></div><div style="position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:600">'+m.lt+'/km - '+p+'%</div></div><span style="font-size:9px;font-weight:700;color:'+bc+'">'+(p<=93?"OK":"--")+'</span></div>'; });
    h += '</div>';
  } else {
    h += '<div class="empty">No fitness metrics yet.<br>Add your VO2max and LT below.</div>';
  }

  h += '<div class="card"><div class="card-title">Add Metric Reading</div>';
  h += '<div class="modal-row" style="margin-bottom:6px"><input id="m-week" inputmode="numeric" placeholder="week #" style="flex:1;padding:8px;background:#0a0e14;border:1px solid #1a1f2b;border-radius:4px;color:#fff"><input id="m-vo2" inputmode="numeric" placeholder="VO2max" style="flex:1;padding:8px;background:#0a0e14;border:1px solid #1a1f2b;border-radius:4px;color:#fff"><input id="m-lt" placeholder="LT eg 4:08" style="flex:1;padding:8px;background:#0a0e14;border:1px solid #1a1f2b;border-radius:4px;color:#fff"></div>';
  h += '<button class="btn-save" onclick="addMetric()">Add reading</button></div>';

  h += '<div class="card"><div style="font-size:8px;color:#3d4556;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Key Paces</div>';
  [{l:"Easy",v:"5:15-5:30/km",c:"#3d4556"},{l:"Marathon",v:"4:29/km",c:"#ff5c35"},{l:"Tempo/LT",v:"4:05-4:15/km",c:"#ff9100"},{l:"Intervals",v:"3:50-4:05/km",c:"#4a9eff"}].forEach(function(p){ h+='<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #12161f"><span style="font-size:10px">'+p.l+'</span><span style="font-size:10px;color:'+p.c+';font-weight:600">'+p.v+'</span></div>'; });
  h += '</div>';
  return h;
}

function renderLog() {
  var d = new Date(logDate+"T00:00:00");
  var label = DAY_NAMES[(d.getDay()+6)%7] + " " + d.getDate() + " " + ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
  var ex = runs[logDate] || {};
  var h = '<div class="modal-bg" onclick="closeLog()"></div><div class="modal">';
  h += '<div style="font-size:9px;color:#3d4556;margin-bottom:8px">Log run - '+label+'</div>';
  h += '<div class="modal-row"><input id="f-km" inputmode="decimal" placeholder="km" value="'+(ex.km||"")+'"><input id="f-pace" placeholder="pace eg 5:15" value="'+(ex.pace||"")+'"><input id="f-hr" inputmode="numeric" placeholder="HR" value="'+(ex.hr||"")+'" style="max-width:70px"></div>';
  h += '<input id="f-note" placeholder="notes" value="'+esc(ex.note||"")+'">';
  h += '<div class="modal-row"><button class="btn-save" onclick="saveLog()">Save</button>';
  if (runs[logDate]) h += '<button class="btn-del" onclick="deleteRun()">Delete</button>';
  h += '<button class="btn-cancel" onclick="closeLog()">Cancel</button></div></div>';
  return h;
}

function renderDetail() {
  var run = runs[detailDate];
  var d = new Date(detailDate+"T00:00:00");
  var monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var dateLabel = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][d.getDay()] + ", " + d.getDate() + " " + monthNames[d.getMonth()] + " " + d.getFullYear();
  var wkNum="", session="", detail="", phaseColor="#3ddc84";
  for (var wi=0; wi<18; wi++){ for (var di=0; di<7; di++){ if (dateKey(wi,di)===detailDate){ wkNum="Week "+PLAN_DATA[wi].week+" - "+PLAN_DATA[wi].phase; session=PLAN_DATA[wi].sessions[di][0]; detail=PLAN_DATA[wi].sessions[di][1]; var ps=PHASE[PLAN_DATA[wi].phase]; if(ps)phaseColor=ps.c; } } }
  var tooFast=false;
  if (run && run.pace && isEasy(session)) { var sec=paceToSec(run.pace); if(sec!==null&&sec<310) tooFast=true; }

  var h = '<div class="modal-bg" onclick="closeDetail()"></div><div class="detail-modal">';
  h += '<div class="detail-date">'+dateLabel+'</div><div style="font-size:10px;color:#3d4556;margin-bottom:10px">'+wkNum+'</div>';
  if (run) {
    h += '<div class="detail-dist" style="color:'+(tooFast?"#ff9100":"#3ddc84")+'">'+run.km+' km</div>';
    if (tooFast) h += '<div style="font-size:11px;color:#ff9100;margin-top:4px">FLAGGED: faster than easy target (under 5:10/km)</div>';
    h += '<div class="detail-grid">';
    if (run.pace) h += '<div><div class="detail-stat-label">Pace</div><div class="detail-stat-val" style="color:#c5cdd8">'+run.pace+'<span style="font-size:12px;color:#3d4556">/km</span></div></div>';
    if (run.hr) h += '<div><div class="detail-stat-label">Avg HR</div><div class="detail-stat-val" style="color:#4a9eff">'+run.hr+'</div></div>';
    h += '</div>';
    if (session) { h += '<div class="detail-section"><div class="detail-label">Planned</div>'+esc(session); if(detail) h+='<div style="font-size:12px;color:#5a6577;margin-top:3px">'+esc(detail)+'</div>'; h+='</div>'; }
    if (run.note) h += '<div class="detail-section"><div class="detail-label">Notes</div>'+esc(run.note)+'</div>';
    h += '<div class="modal-row" style="margin-top:14px"><button class="btn-save" onclick="editFromDetail()">Edit</button><button class="btn-cancel" onclick="closeDetail()">Close</button></div>';
  } else {
    h += '<div class="detail-label">Session</div><div style="font-size:26px;font-weight:700;color:'+phaseColor+';line-height:1.2;margin:4px 0 10px">'+esc(session)+'</div>';
    if (detail) h += '<div class="detail-section" style="border-top:none;font-size:15px;color:#c5cdd8;padding-top:0">'+esc(detail)+'</div>';
    h += '<div class="modal-row" style="margin-top:18px"><button class="btn-save" onclick="editFromDetail()">Log this run</button><button class="btn-cancel" onclick="closeDetail()">Close</button></div>';
  }
  h += '</div>';
  return h;
}

function renderDataPanel() {
  var backup = JSON.stringify({ runs: runs, metrics: metrics });
  var h = '<div class="modal-bg" onclick="closeData()"></div><div class="modal">';
  h += '<div style="font-size:11px;font-weight:700;margin-bottom:8px">Data</div>';
  h += '<div style="font-size:9px;color:#3d4556;margin-bottom:4px">EXPORT for Claude (paste into chat)</div>';
  h += '<button class="btn-save" style="margin-bottom:10px" onclick="exportSummary()">Copy summary for Claude</button>';
  h += '<div style="font-size:9px;color:#3d4556;margin-bottom:4px">BACKUP / RESTORE (JSON)</div>';
  h += '<textarea class="data-box" id="data-json" placeholder="Paste JSON here to import, or copy the text below to back up">'+esc(backup)+'</textarea>';
  h += '<div class="modal-row"><button class="btn-save" onclick="importJson()">Import pasted JSON</button><button class="btn-cancel" onclick="copyBackup()">Copy backup</button><button class="btn-cancel" onclick="closeData()">Close</button></div>';
  h += '</div>';
  return h;
}

// ============================================================
// ACTIONS
// ============================================================
function setView(v){ view=v; render(); }
function toggleWeek(wi){ openWeek=(openWeek===wi)?null:wi; render(); }
function openDetail(e, dk){ e.stopPropagation(); detailDate=dk; render(); }
function closeDetail(){ detailDate=null; render(); }
function editFromDetail(){ var dk=detailDate; detailDate=null; logDate=dk; render(); var el=document.getElementById("f-km"); if(el)el.focus(); }
function openLog(e, dk){ e.stopPropagation(); logDate=dk; render(); var el=document.getElementById("f-km"); if(el)el.focus(); }
function closeLog(){ logDate=null; render(); }
function saveLog(){
  var km=parseFloat(document.getElementById("f-km").value);
  if(!km){ closeLog(); return; }
  runs[logDate]={ km:km, pace:document.getElementById("f-pace").value, hr:document.getElementById("f-hr").value?parseInt(document.getElementById("f-hr").value):null, note:document.getElementById("f-note").value };
  saveRuns(); logDate=null; render();
}
function deleteRun(){ if(runs[logDate]){ delete runs[logDate]; saveRuns(); } logDate=null; render(); }

function addMetric(){
  var wk=parseInt(document.getElementById("m-week").value);
  var vo2=parseInt(document.getElementById("m-vo2").value);
  var lt=document.getElementById("m-lt").value;
  if(!wk||!lt){ showToast("Need week and LT"); return; }
  metrics.push({ week:wk, vo2:vo2||null, lt:lt });
  metrics.sort(function(a,b){ return a.week-b.week; });
  saveMetrics(); render();
}

function toggleData(){ dataPanel=!dataPanel; render(); }
function closeData(){ dataPanel=false; render(); }
function importJson(){
  var txt=document.getElementById("data-json").value;
  try {
    var obj=JSON.parse(txt);
    if(obj.runs) runs=obj.runs;
    if(obj.metrics) metrics=obj.metrics;
    saveRuns(); saveMetrics();
    showToast("Imported!");
    dataPanel=false; render();
  } catch(e){ showToast("Invalid JSON"); }
}
function copyBackup(){
  var t=document.getElementById("data-json");
  t.value=JSON.stringify({runs:runs,metrics:metrics});
  t.select();
  if(navigator.clipboard) navigator.clipboard.writeText(t.value).then(function(){showToast("Backup copied");}).catch(function(){try{document.execCommand("copy");showToast("Backup copied");}catch(e){}});
  else { try{document.execCommand("copy");showToast("Backup copied");}catch(e){} }
}

function exportSummary(){
  var totalKm=0, totalRuns=0;
  for (var k in runs){ if(runs[k].km){ totalKm+=runs[k].km; totalRuns++; } }
  totalKm=Math.round(totalKm*10)/10;
  var lm=latestMetric();
  var mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var now=new Date();
  var out="SYDNEY MARATHON - LOG EXPORT\n";
  out+="Generated: "+now.getDate()+" "+mn[now.getMonth()]+" "+now.getFullYear()+"\n";
  out+="Total: "+totalKm+"km / "+totalRuns+" runs";
  if(lm) out+=" | VO2 "+lm.vo2+" | LT "+lm.lt+" | MP/LT "+ltPct(lm.lt)+"%";
  out+="\n------------------------------------\n";
  Object.keys(runs).sort().forEach(function(key){
    var r=runs[key]; if(!r.km) return;
    var wkNum="",session="",dayName="";
    for(var wi=0;wi<18;wi++){for(var di=0;di<7;di++){if(dateKey(wi,di)===key){wkNum="W"+PLAN_DATA[wi].week;session=PLAN_DATA[wi].sessions[di][0];dayName=DAY_NAMES[di];}}}
    var d=new Date(key+"T00:00:00");
    var line=dayName+" "+("0"+d.getDate()).slice(-2)+" "+mn[d.getMonth()]+" ("+wkNum+"): "+r.km+"km";
    if(r.pace) line+=" @ "+r.pace;
    if(r.hr) line+=" HR"+r.hr;
    if(session) line+=" [plan: "+session+"]";
    if(r.note) line+=" - "+r.note;
    out+=line+"\n";
  });
  out+="------------------------------------\nPaste to Claude to sync + analyse.";
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(out).then(function(){showToast("Copied! Paste into Claude");}).catch(function(){fallbackCopy(out);});
  } else { fallbackCopy(out); }
}
function fallbackCopy(text){
  var t=document.getElementById("data-json");
  if(t){ t.value=text; t.select(); try{document.execCommand("copy");showToast("Copied!");}catch(e){} }
}

function showToast(msg){
  var ex=document.getElementById("toast"); if(ex) ex.remove();
  var t=document.createElement("div"); t.id="toast"; t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(function(){if(t)t.remove();},2500);
}

// ============================================================
// INIT
// ============================================================
loadAll();
render();
if ("serviceWorker" in navigator) { navigator.serviceWorker.register("service-worker.js").catch(function(){}); }
</script>
