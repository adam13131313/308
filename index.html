var METRICS = [
  { week:1, lt:"4:19", pct:96.0 },
  { week:5, lt:"4:15", pct:94.4 },
  { week:6, lt:"4:08", pct:91.8 },
];

var DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var RACE_DATE = new Date(2026,7,30);
var PHASE = {
  Base:{c:"#4a9eff",bg:"#142a44"}, Build:{c:"#3ddc84",bg:"#143322"},
  Peak:{c:"#ff9100",bg:"#332211"}, Travel:{c:"#b388ff",bg:"#261044"},
  Sharpen:{c:"#ffd600",bg:"#33301a"}, Taper:{c:"#ff4081",bg:"#330f22"},
};
var STORAGE_KEY = "sydney-marathon-runs";

// ============ STATE ============
var runs = {};
var view = "plan";
var openWeek = null;
var logDate = null;

function loadRuns() {
  var stored = {};
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) stored = JSON.parse(raw);
  } catch(e) {}
  runs = {};
  for (var k in SEED_RUNS) runs[k] = SEED_RUNS[k];
  for (var k2 in stored) runs[k2] = stored[k2];
}

function saveRuns() {
  var extra = {};
  for (var k in runs) {
    var s = SEED_RUNS[k];
    if (!s || s.km !== runs[k].km || s.pace !== runs[k].pace || s.hr !== runs[k].hr || s.note !== runs[k].note) {
      extra[k] = runs[k];
    }
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(extra)); } catch(e) {}
}

// ============ HELPERS ============
function dateKey(wi, di) {
  var d = new Date(2026, 3, 27 + wi*7 + di);
  var y = d.getFullYear();
  var m = ("0"+(d.getMonth()+1)).slice(-2);
  var dd = ("0"+d.getDate()).slice(-2);
  return y + "-" + m + "-" + dd;
}
function paceToSec(p) {
  if (!p) return null;
  var x = p.split(":");
  if (x.length !== 2) return null;
  return parseInt(x[0])*60 + parseInt(x[1]);
}
function isEasy(s) { return s && (s.indexOf("Easy")===0 || s.indexOf("Long Run")===0 || s.indexOf("Shakeout")===0); }
function weekKm(wi) {
  var t=0,n=0;
  for (var d=0;d<7;d++){ var r=runs[dateKey(wi,d)]; if(r&&r.km){t+=r.km;n++;} }
  return { km: Math.round(t*10)/10, n:n };
}
function currentWeek() {
  return Math.floor((new Date() - new Date(2026,3,27)) / (7*86400000));
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ============ RENDER ============
function render() {
  var totalKm=0, totalRuns=0;
  for (var k in runs){ if(runs[k].km){ totalKm+=runs[k].km; totalRuns++; } }
  totalKm = Math.round(totalKm);
  var days = Math.ceil((RACE_DATE - new Date())/86400000);
  var lm = METRICS[METRICS.length-1];
  var cw = currentWeek();

  var h = '';
  h += '<div class="header">';
  h += '<div class="title">SYDNEY <span style="color:#ff5c35">3:08:59</span> <span style="font-size:10px;color:#3d4556;font-weight:400">30 AUG 2026</span></div>';
  h += '<div class="nav">';
  ["plan","chart","metrics"].forEach(function(v){
    h += '<button class="'+(view===v?'active':'')+'" onclick="setView(\''+v+'\')">'+v+'</button>';
  });
  h += '<button class="export-btn" onclick="doExport()">EXPORT</button>';
  h += '</div></div>';

  // stats
  var stats = [
    {l:"Days to go", v:days>0?days:0, c:"#ff5c35"},
    {l:"Total", v:totalKm+"km", c:"#c5cdd8"},
    {l:"Runs", v:totalRuns, c:"#c5cdd8"},
    {l:"VO2", v:"57", c:"#4a9eff"},
    {l:"MP%", v:lm.pct, c:lm.pct<=93?"#3ddc84":"#ff9100"},
  ];
  h += '<div class="stats">';
  stats.forEach(function(s){
    h += '<div class="stat"><div class="stat-label">'+s.l+'</div><div class="stat-value" style="color:'+s.c+'">'+s.v+'</div></div>';
  });
  h += '</div>';

  h += '<div class="content">';
  if (view==="plan") h += renderPlan(cw);
  if (view==="chart") h += renderChart();
  if (view==="metrics") h += renderMetrics();
  h += '</div>';

  if (logDate) h += renderModal();

  document.getElementById("app").innerHTML = h;
}

function renderPlan(cw) {
  var h = '';
  PLAN_DATA.forEach(function(wk, wi){
    var st = weekKm(wi);
    var pct = st.km>0 ? Math.round(st.km/wk.planned*100) : 0;
    var ps = PHASE[wk.phase] || PHASE.Base;
    var pctColor = pct>=95?"#3ddc84":pct>=80?"#ff9100":"#ff5c35";
    var isOpen = openWeek===wi;
    var isCur = wi===cw;
    var cls = "week-head" + (isOpen?" open":"") + (isCur&&!isOpen?" current":"");
    var border = isOpen ? "border-color:"+ps.c+"44;" : "";

    h += '<div class="'+cls+'" style="'+border+'" onclick="toggleWeek('+wi+')">';
    h += '<span style="color:'+(isCur?ps.c:"#3d4556")+';font-size:10px;min-width:24px;font-weight:700">W'+wk.week+'</span>';
    h += '<span class="phase-tag" style="background:'+ps.bg+';color:'+ps.c+'">'+wk.phase+'</span>';
    if (isCur) h += '<span style="font-size:8px;color:'+ps.c+'">NOW</span>';
    h += '<span style="flex:1"></span>';
    if (st.km>0) {
      h += '<span style="font-size:10px;font-weight:700;color:#c5cdd8">'+st.km+'km</span>';
      h += '<span style="font-size:8px;color:#3d4556">of '+wk.planned+'</span>';
      h += '<span style="font-size:9px;font-weight:700;color:'+pctColor+'">'+pct+'%</span>';
    } else {
      h += '<span style="font-size:10px;color:#1e2530">'+wk.planned+'km</span>';
    }
    h += '<span style="font-size:10px;color:#3d4556;margin-left:4px">'+(isOpen?"&minus;":"+")+'</span>';
    h += '</div>';

    if (isOpen) {
      h += '<div class="week-body" style="border:1px solid '+ps.c+'44;border-top:none">';
      h += '<div style="font-size:8px;color:#3d4556;margin-bottom:6px">'+wk.dates+'</div>';
      wk.sessions.forEach(function(sessArr, di){
        var sess = sessArr[0];
        var detail = sessArr[1];
        var dk = dateKey(wi, di);
        var run = runs[dk];
        var isRest = sess==="Rest";
        var isRace = sess==="RACE DAY!";
        var tooFast = false;
        if (run && run.pace && isEasy(sess)) {
          var sec = paceToSec(run.pace);
          if (sec!==null && sec<310) tooFast = true;
        }
        var dcls = "day" + (run?" run":"") + (tooFast?" fast":"") + (isRest&&!run?" rest":"") + ((!isRest&&!isRace&&!run)?" loggable":"");
        var clickAttr = (!isRest&&!isRace&&!run) ? ' onclick="openLog(event,\''+dk+'\')"' : '';
        h += '<div class="'+dcls+'"'+clickAttr+'>';
        h += '<span style="font-size:9px;color:#3d4556;font-weight:700;min-width:24px;align-self:flex-start;padding-top:1px">'+DAY_NAMES[di]+'</span>';
        h += '<span style="flex:1">';
        h += '<span style="font-size:9px;color:'+(isRest?"#1e2530":"#5a6577")+';display:block">'+esc(sess)+'</span>';
        if (detail) h += '<span style="font-size:8px;color:'+(isRace?"#ff5c35":"#2f3a4a")+';display:block;margin-top:1px">'+esc(detail)+'</span>';
        h += '</span>';
        if (run) {
          h += '<span style="display:flex;align-items:center;gap:5px;align-self:flex-start;padding-top:1px">';
          if (tooFast) h += '<span style="font-size:8px;color:#ff9100">FAST</span>';
          h += '<span style="font-size:12px;font-weight:700;color:'+(tooFast?"#ff9100":"#3ddc84")+'">'+run.km+'</span>';
          if (run.pace) h += '<span style="font-size:8px;color:#3d4556">'+run.pace+'</span>';
          if (run.hr) h += '<span style="font-size:8px;color:#4a9eff">HR'+run.hr+'</span>';
          h += '</span>';
        } else if (!isRest && !isRace) {
          h += '<span style="font-size:8px;color:#1e2530;align-self:flex-start;padding-top:1px">+ log</span>';
        }
        h += '</div>';
      });
      if (st.km>0) h += '<div style="margin-top:6px;padding:4px 6px;font-size:9px;color:#3d4556;border-top:1px solid '+ps.c+'22">'+st.n+' runs · '+st.km+'km of '+wk.planned+'km · '+pct+'%</div>';
      h += '</div>';
    }
  });
  return h;
}

function renderChart() {
  var cum=[], cp=0, ca=0;
  for (var i=0;i<18;i++){ cp+=PLAN_DATA[i].planned; var s=weekKm(i); if(s.km>0)ca+=s.km; cum.push({w:i+1,p:cp,a:s.km>0?ca:null}); }
  var mx = Math.max.apply(null, cum.map(function(d){return d.p;}));
  var pp = cum.map(function(d,i){return (28+i*(302/17))+","+(155-(d.p/mx)*140);}).join(" ");
  var af = cum.filter(function(d){return d.a!==null;});
  var ap = af.map(function(d,i){return (28+i*(302/17))+","+(155-(d.a/mx)*140);}).join(" ");

  var h = '<div class="card"><div class="card-title">Cumulative KM</div>';
  h += '<svg viewBox="0 0 340 170">';
  [0,200,400,600,800].forEach(function(v){
    var y=155-(v/mx)*140;
    h += '<line x1="28" y1="'+y+'" x2="330" y2="'+y+'" stroke="#1a1f2b" stroke-width="0.5"/>';
    h += '<text x="25" y="'+(y+3)+'" fill="#3d4556" font-size="6" text-anchor="end">'+v+'</text>';
  });
  h += '<polyline fill="none" stroke="#2a3040" stroke-width="1.5" stroke-dasharray="4,3" points="'+pp+'"/>';
  h += '<polyline fill="none" stroke="#3ddc84" stroke-width="2" points="'+ap+'"/>';
  af.forEach(function(d,i){ h += '<circle cx="'+(28+i*(302/17))+'" cy="'+(155-(d.a/mx)*140)+'" r="2.5" fill="#3ddc84"/>'; });
  cum.forEach(function(d,i){ h += '<text x="'+(28+i*(302/17))+'" y="166" fill="#3d4556" font-size="5.5" text-anchor="middle">'+d.w+'</text>'; });
  h += '</svg>';
  h += '<div style="display:flex;gap:10px;justify-content:center;margin-top:4px;font-size:8px;color:#3d4556"><span>- - Planned</span><span style="color:#3ddc84">--- Actual</span></div></div>';

  // HR trend
  var pts = [];
  var keys = Object.keys(runs).sort();
  keys.forEach(function(k){ var r=runs[k]; if(r.hr&&r.km>=7) pts.push(r.hr); });
  if (pts.length>=2) {
    var minH=120, maxH=165;
    var hp = pts.map(function(v,i){ return (30+i*(300/(pts.length-1)))+","+(110-((v-minH)/(maxH-minH))*95); }).join(" ");
    h += '<div class="card"><div class="card-title">Easy-Run HR Trend</div>';
    h += '<div style="font-size:8px;color:#3d4556;margin-bottom:8px">Lower = improving fitness (runs 7km+)</div>';
    h += '<svg viewBox="0 0 340 125">';
    [130,145,160].forEach(function(v){ var y=110-((v-minH)/(maxH-minH))*95; h += '<line x1="30" y1="'+y+'" x2="335" y2="'+y+'" stroke="#1a1f2b" stroke-width="0.5"/><text x="27" y="'+(y+3)+'" fill="#3d4556" font-size="6" text-anchor="end">'+v+'</text>'; });
    h += '<polyline fill="none" stroke="#4a9eff" stroke-width="2" points="'+hp+'"/>';
    pts.forEach(function(v,i){ h += '<circle cx="'+(30+i*(300/(pts.length-1)))+'" cy="'+(110-((v-minH)/(maxH-minH))*95)+'" r="2.5" fill="#4a9eff"/>'; });
    h += '</svg></div>';
  }

  // volume bars
  h += '<div class="card"><div class="card-title">Weekly Volume</div><svg viewBox="0 0 340 110">';
  PLAN_DATA.forEach(function(wk,i){
    var s=weekKm(i); var bw=14; var x=10+i*(326/18); var mw=80;
    var hpl=(wk.planned/mw)*90; var ha=s.km>0?(s.km/mw)*90:0; var ps=PHASE[wk.phase]||PHASE.Base;
    h += '<rect x="'+x+'" y="'+(98-hpl)+'" width="'+bw+'" height="'+hpl+'" fill="#1a1f2b" rx="2"/>';
    if (ha>0) h += '<rect x="'+x+'" y="'+(98-ha)+'" width="'+bw+'" height="'+ha+'" fill="'+ps.c+'" rx="2" opacity="0.6"/>';
    h += '<text x="'+(x+bw/2)+'" y="108" fill="#3d4556" font-size="5.5" text-anchor="middle">'+(i+1)+'</text>';
  });
  h += '</svg></div>';
  return h;
}

function renderMetrics() {
  var h = '';
  var cards = [
    {l:"VO2max",v:"57",t:"57-58",c:"#4a9eff"},
    {l:"LT Pace",v:"4:08/km",t:"4:05-4:10",c:"#3ddc84"},
    {l:"MP/LT",v:"91.8%",t:"93% or less",c:"#3ddc84"},
  ];
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">';
  cards.forEach(function(m){
    h += '<div class="card" style="margin:0;padding:10px"><div style="font-size:8px;color:#3d4556;text-transform:uppercase;letter-spacing:0.5px">'+m.l+'</div><div style="font-size:16px;font-weight:700;color:'+m.c+';margin:3px 0">'+m.v+'</div><div style="font-size:7px;color:#1e2530">Target: '+m.t+'</div></div>';
  });
  h += '</div>';

  h += '<div class="card"><div style="font-size:8px;color:#3d4556;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">LT to Marathon Pace Headroom</div>';
  METRICS.forEach(function(m){
    var bc = m.pct<=93?"#3ddc84":"#ff9100";
    h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">';
    h += '<span style="font-size:8px;color:#3d4556;min-width:30px">Wk'+m.week+'</span>';
    h += '<div style="flex:1;height:16px;background:#0a0e14;border-radius:3px;position:relative;overflow:hidden">';
    h += '<div style="position:absolute;left:0;top:0;bottom:0;width:'+((100-m.pct)*3)+'%;background:'+bc+'33;border-radius:3px"></div>';
    h += '<div style="position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:600">'+m.lt+'/km - '+m.pct+'%</div></div>';
    h += '<span style="font-size:9px;font-weight:700;color:'+bc+'">'+(m.pct<=93?"OK":"--")+'</span></div>';
  });
  h += '</div>';

  h += '<div class="card"><div style="font-size:8px;color:#3d4556;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Key Paces</div>';
  [{l:"Easy",v:"5:15-5:30/km",c:"#3d4556"},{l:"Marathon",v:"4:28-4:30/km",c:"#ff5c35"},{l:"Tempo/LT",v:"4:05-4:15/km",c:"#ff9100"},{l:"Intervals",v:"3:50-4:05/km",c:"#4a9eff"}].forEach(function(p){
    h += '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #12161f"><span style="font-size:10px">'+p.l+'</span><span style="font-size:10px;color:'+p.c+';font-weight:600">'+p.v+'</span></div>';
  });
  h += '</div>';
  return h;
}

function renderModal() {
  var d = new Date(logDate+"T00:00:00");
  var label = DAY_NAMES[(d.getDay()+6)%7] + " " + d.getDate() + " " + ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
  var existing = runs[logDate] || {};
  var h = '<div class="modal-bg" onclick="closeLog()"></div>';
  h += '<div class="modal">';
  h += '<div style="font-size:9px;color:#3d4556;margin-bottom:8px">Log run - '+label+'</div>';
  h += '<div class="modal-row"><input id="f-km" inputmode="decimal" placeholder="km" value="'+(existing.km||"")+'"><input id="f-pace" placeholder="pace eg 5:15" value="'+(existing.pace||"")+'"><input id="f-hr" inputmode="numeric" placeholder="HR" value="'+(existing.hr||"")+'" style="max-width:70px"></div>';
  h += '<input id="f-note" placeholder="notes" value="'+esc(existing.note||"")+'">';
  h += '<div class="modal-row"><button class="btn-save" onclick="saveLog()">Save</button><button class="btn-cancel" onclick="closeLog()">Cancel</button></div>';
  h += '</div>';
  return h;
}

// ============ ACTIONS ============
function setView(v){ view=v; render(); }
function toggleWeek(wi){ openWeek = (openWeek===wi)?null:wi; render(); }
function openLog(e, dk){ e.stopPropagation(); logDate=dk; render(); var el=document.getElementById("f-km"); if(el)el.focus(); }
function closeLog(){ logDate=null; render(); }
function saveLog(){
  var km = parseFloat(document.getElementById("f-km").value);
  if (!km) { closeLog(); return; }
  runs[logDate] = {
    km: km,
    pace: document.getElementById("f-pace").value,
    hr: document.getElementById("f-hr").value ? parseInt(document.getElementById("f-hr").value) : null,
    note: document.getElementById("f-note").value,
  };
  saveRuns();
  logDate=null;
  render();
}

// ============ EXPORT ============
function buildExport() {
  var totalKm=0, totalRuns=0;
  for (var k in runs){ if(runs[k].km){ totalKm+=runs[k].km; totalRuns++; } }
  totalKm = Math.round(totalKm*10)/10;
  var lm = METRICS[METRICS.length-1];
  var now = new Date();
  var monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  var out = "SYDNEY MARATHON - LOG EXPORT\n";
  out += "Generated: " + now.getDate() + " " + monthNames[now.getMonth()] + " " + now.getFullYear() + "\n";
  out += "Total: " + totalKm + "km / " + totalRuns + " runs | VO2 57 | LT 4:08 | MP/LT " + lm.pct + "%\n";
  out += "------------------------------------\n";

  // build a map of date -> {week, dayName, session}
  var sortedKeys = Object.keys(runs).sort();
  sortedKeys.forEach(function(key){
    var r = runs[key];
    if (!r.km) return;
    // find week/day
    var label = key;
    var wkNum = "", session = "", dayName = "";
    for (var wi=0; wi<18; wi++){
      for (var di=0; di<7; di++){
        if (dateKey(wi,di)===key){
          wkNum = "W" + PLAN_DATA[wi].week;
          session = PLAN_DATA[wi].sessions[di][0];
          dayName = DAY_NAMES[di];
        }
      }
    }
    var d = new Date(key+"T00:00:00");
    var dateStr = ("0"+d.getDate()).slice(-2) + " " + monthNames[d.getMonth()];
    var line = dayName + " " + dateStr + " (" + wkNum + "): " + r.km + "km";
    if (r.pace) line += " @ " + r.pace;
    if (r.hr) line += " HR" + r.hr;
    if (session) line += " [plan: " + session + "]";
    if (r.note) line += " - " + r.note;
    out += line + "\n";
  });

  out += "------------------------------------\n";
  out += "Paste to Claude to sync spreadsheet + analyse.";
  return out;
}

function doExport() {
  var text = buildExport();
  // try clipboard
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){
      showToast("Copied! Paste into Claude chat");
    }).catch(function(){
      showExportModal(text);
    });
  } else {
    showExportModal(text);
  }
}

function showExportModal(text) {
  var h = '<div class="modal-bg" onclick="closeExport()"></div>';
  h += '<div class="modal export-modal">';
  h += '<div style="font-size:9px;color:#3d4556;margin-bottom:8px">Select all and copy, then paste into Claude</div>';
  h += '<textarea id="export-text" readonly onclick="this.select()">' + esc(text) + '</textarea>';
  h += '<div class="modal-row"><button class="btn-save" onclick="copyExportText()">Copy</button><button class="btn-cancel" onclick="closeExport()">Close</button></div>';
  h += '</div>';
  var overlay = document.createElement("div");
  overlay.id = "export-overlay";
  overlay.innerHTML = h;
  document.body.appendChild(overlay);
  setTimeout(function(){ var t=document.getElementById("export-text"); if(t){t.focus();t.select();} }, 50);
}

function copyExportText() {
  var t = document.getElementById("export-text");
  if (t) { t.select(); try { document.execCommand("copy"); showToast("Copied!"); } catch(e){} }
}

function closeExport() {
  var o = document.getElementById("export-overlay");
  if (o) o.remove();
}

function showToast(msg) {
  var existing = document.getElementById("toast");
  if (existing) existing.remove();
  var t = document.createElement("div");
  t.id = "toast";
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ if(t) t.remove(); }, 2500);
}

// ============ INIT ============
loadRuns();
render();

// service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js").catch(function(){});
}
